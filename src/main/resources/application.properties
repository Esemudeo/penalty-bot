discord.bot-token=${DISCORD_BOT_TOKEN:}
discord.oauth.client-id=${DISCORD_CLIENT_ID:}
discord.oauth.client-secret=${DISCORD_CLIENT_SECRET:}
discord.oauth.redirect-uri=${DISCORD_REDIRECT_URI:http://localhost:8080/oauth/callback}
app.base-url=${APP_BASE_URL:http://localhost:8080}
quarkus.http.host=0.0.0.0
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_JDBC_URL:}
quarkus.datasource.username=penalty-bot
quarkus.datasource.password=${DB_PASSWORD:}
quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.datasource.devservices.image-name=postgres:18
quarkus.datasource.devservices.db-name=penalty-bot
quarkus.datasource.devservices.port=15432
quarkus.datasource.devservices.username=penalty-bot
quarkus.datasource.devservices.password=penalty-bot
%prod.quarkus.datasource.devservices.enabled=false
%dev.quarkus.datasource.devservices.enabled=false
%test.quarkus.datasource.devservices.enabled=true
